name: Profile WebGPU Startup

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to profile
        required: true
        default: eugeniy/hel-142-profile-desktop-frame-spikes-on-rtx-chrome-for-webgpu-scene
      chrome_executable_path:
        description: Optional absolute Chrome executable path on the runner host
        required: false
        default: ""
      require_rtx:
        description: Require an RTX-class renderer for the capture
        required: true
        default: "true"
      browser_args:
        description: Optional browser flags separated by newlines or ';;'
        required: false
        default: ""

jobs:
  profile:
    runs-on:
      - self-hosted
      - windows
      - x64
      - gpu
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Log profiling inputs
        shell: bash
        run: |
          echo "ref=${{ inputs.ref }}"
          echo "require_rtx=${{ inputs.require_rtx }}"
          echo "chrome_executable_path=${{ inputs.chrome_executable_path }}"

      - name: Run WebGPU startup profiling via local preview
        shell: bash
        env:
          PLAYWRIGHT_PROFILE_EXECUTABLE_PATH: ${{ inputs.chrome_executable_path }}
          PLAYWRIGHT_PROFILE_REQUIRE_RTX: ${{ inputs.require_rtx == 'true' && '1' || '0' }}
          PLAYWRIGHT_PROFILE_BROWSER_ARGS: ${{ inputs.browser_args }}
        run: npm run profile:webgpu-startup:local-preview

      - name: Upload startup profiling artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webgpu-startup-profile-${{ github.run_id }}
          path: reports/startup-profiling
          if-no-files-found: warn
          retention-days: 14
