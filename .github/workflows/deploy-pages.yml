name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run aggregate validation
        run: npm run check

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static bundle for Pages
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Record deployment URL and notify downstream systems
        id: report
        run: node scripts/report_deployment_url.mjs --url "${{ needs.deploy.outputs.page_url }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: -1003774956386
          TELEGRAM_TOPIC_ID: 1499
          SYMPHONY_DEPLOY_WEBHOOK_URL: ${{ secrets.SYMPHONY_DEPLOY_WEBHOOK_URL }}

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metadata
          path: reports/deployment/github-pages.json

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test the deployed app
        run: npm run test:deploy-smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.page_url }}

      - name: Upload deploy smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-smoke-evidence
          path: reports/deploy-smoke
          if-no-files-found: warn
          retention-days: 14
